<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
}

/* topo */

.header{
  background:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.header h2{
  color:#333;
}

.logout{
  padding:8px 16px;
  border:none;
  border-radius:6px;
  background:#e74c3c;
  color:white;
  cursor:pointer;
}

.logout:hover{
  background:#c0392b;
}

/* conteúdo */

.container{
  padding:40px;
  display:flex;
  justify-content:center;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  width:700px;
}

.card{
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  transition:0.2s;
  text-decoration:none;
  color:#333;
}

.card:hover{
  transform:translateY(-5px);
}

.card h3{
  margin-top:10px;
}

.icon{
  font-size:40px;
}
</style>

</head>

<body>

<div class="header">
  <h2>Sistema de Solicitação de Ferramentas</h2>
  <button class="logout" onclick="logout()">Sair</button>
</div>

<div class="container">

<div class="cards">

<a class="card" href="solicitar.html">
<div class="icon">🧰</div>
<h3>Solicitar e Devolução Equipamento</h3>
<p>....................</p>
</a>

<a class="card" href="controle.html">
<div class="icon">📋</div>
<h3>Controle</h3>
<p>....................</p>
</a>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script src="firebase-config.js"></script>

<script>
function logout() {
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
