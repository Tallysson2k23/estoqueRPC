<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.header{
  background:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.header h2{
  color:#333;
}

.logout{
  padding:8px 16px;
  border:none;
  border-radius:6px;
  background:#e74c3c;
  color:white;
  cursor:pointer;
}

.logout:hover{
  background:#c0392b;
}

/* ALERTA */
.alerta{
  width:90%;
  max-width:900px;
  margin:20px auto;
  background:#f39c12;
  color:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  display:none;
}

.container{
  padding:40px;
  display:flex;
  justify-content:center;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  width:700px;
}

.card{
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  transition:0.2s;
  text-decoration:none;
  color:#333;
}

.card:hover{
  transform:translateY(-5px);
}

.card h3{
  margin-top:10px;
}

.icon{
  font-size:40px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Sistema de Solicitação de Ferramentas</h2>
  <button class="logout" onclick="logout()">Sair</button>
</div>

<!-- 🔥 ALERTA -->
<div id="alerta" class="alerta"></div>

<div class="container">
  <div class="cards">

    <a class="card" href="solicitar.html">
      <div class="icon">🧰</div>
      <h3>Solicitar e Devolução Equipamento</h3>
      <p>....................</p>
    </a>

    <a class="card" href="controle.html">
      <div class="icon">📋</div>
      <h3>Controle</h3>
      <p>....................</p>
    </a>

  </div>
</div>

<!-- 🔥 SCRIPT MODERNO (V10) -->
<script type="module">

import { auth, db } from "./firebase-config.js";

import { 
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// logout correto
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

// verifica usuário e busca pendências
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  try {

    const q = query(
      collection(db, "solicitacoes_ferramentas"),
      where("uid", "==", user.uid),
      where("status", "==", "solicitado")
    );

    const snapshot = await getDocs(q);

    const alerta = document.getElementById("alerta");

    if (!snapshot.empty) {

      let equipamentos = [];

      snapshot.forEach(doc => {
        const dados = doc.data();
        equipamentos.push(dados.equipamento);
      });

      alerta.style.display = "block";
      alerta.innerText =
        "⚠️ Você possui equipamento(s) aguardando devolução: " +
        equipamentos.join(", ");

    } else {
      alerta.style.display = "none";
    }

  } catch (error) {
    console.error("Erro ao buscar dados:", error);
  }

});

</script>

</body>
</html>
