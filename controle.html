<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Solicitações</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
}

/* HEADER */

.header{
  background:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.header h2{
  color:#333;
}

.voltar{
  padding:8px 16px;
  background:#2a5298;
  color:white;
  text-decoration:none;
  border-radius:6px;
}

.voltar:hover{
  background:#1e3c72;
}

/* CONTAINER */

.container{
  padding:40px;
  display:flex;
  justify-content:center;
}

.card{
  width:900px;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TABELA */

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:#2a5298;
  color:white;
}

th, td{
  padding:12px;
  text-align:left;
}

tbody tr{
  border-bottom:1px solid #ddd;
}

tbody tr:hover{
  background:#f5f5f5;
}

th{
  font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
  <h2>Controle de Solicitações</h2>
  <a class="voltar" href="dashboard.html">Voltar</a>
</div>

<div class="container">

<div class="card">

<table>

<thead>
<tr>
<th>Usuário</th>
<th>Equipamento</th>
<th>Solicitado em</th>
<th>Devolvido em</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tabelaSolicitacoes"></tbody>

</table>

</div>

</div>

<script type="module" src="js/controle.js"></script>

</body>
</html>
