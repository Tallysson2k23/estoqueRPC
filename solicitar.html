<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Equipamentos</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  padding:30px;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
}

/* TÍTULO */

h2{
  text-align:center;
  color:white;
  margin-bottom:30px;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* CARD PRODUTO */

.card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGEM */

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

/* NOME */

.nome{
  margin:10px 0;
  font-weight:bold;
  color:#333;
}

/* BOTÕES */

.botoes{
  display:flex;
  gap:8px;
}

button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.solicitar{
  background:#2a5298;
}

.solicitar:hover{
  background:#1e3c72;
}

.devolver{
  background:#27ae60;
}

.devolver:hover{
  background:#1f8a4d;
}

</style>

</head>
